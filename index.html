<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evolução Eleitoral — Deputados Federais MG 2002–2022</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS',sans-serif;background:#f4f3ef;color:#1a1916;min-height:100vh;font-size:15px}
/* ── Header ── */
.hdr{background:#1a1916;color:#f4f3ef;padding:1.4rem 2rem 1.1rem;border-bottom:3px solid #e67700}
.hdr h1{font-family:Georgia,serif;font-size:1.35rem;font-weight:normal;line-height:1.3;color:#f4f3ef}
.hdr p{font-size:.7rem;color:#b0aca4;margin-top:.3rem;letter-spacing:.06em;text-transform:uppercase}
/* ── Toolbar ── */
.tb{background:#fff;border-bottom:1px solid rgba(0,0,0,.09);padding:.65rem 2rem;display:flex;align-items:flex-end;gap:.7rem;flex-wrap:wrap}
.tb-grp{display:flex;flex-direction:column;gap:2px}
.tb label{font-size:.63rem;color:#7a7870;text-transform:uppercase;letter-spacing:.05em}
.tb input,.tb select{border:1px solid rgba(0,0,0,.13);background:#f4f3ef;padding:.33rem .58rem;font-size:.78rem;border-radius:5px;color:#1a1916;font-family:inherit;outline:none;transition:border-color .15s}
.tb input{width:170px}
.tb input:focus,.tb select:focus{border-color:#3b5bdb;background:#fff}
.pill{margin-left:auto;align-self:center;font-size:.68rem;color:#7a7870;background:#ece9e3;padding:.27rem .72rem;border-radius:100px;border:1px solid rgba(0,0,0,.09);white-space:nowrap}
.pill strong{color:#1a1916}
/* ── City banner ── */
.ac-banner{background:#eff6ff;border-bottom:1px solid #bfdbfe;padding:.45rem 2rem;font-size:.76rem;color:#1e3a8a;display:none;align-items:center;gap:1rem;flex-wrap:wrap}
.ac-banner .ac-info{flex:1}
.ac-banner strong{font-weight:600}
.ac-banner button{background:none;border:1px solid #93c5fd;border-radius:4px;padding:.2rem .58rem;font-size:.7rem;color:#1e40af;cursor:pointer;font-family:inherit}
.ac-banner button:hover{background:#dbeafe}
/* ── Main ── */
main{padding:1.1rem 2rem 3rem}
.top-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:9px;margin-bottom:1.2rem}
.top-box{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:8px;padding:.72rem 1rem}
.lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:#7a7870;margin-bottom:.25rem}
.val{font-size:1.05rem;font-weight:500;font-family:Georgia,serif;line-height:1.2}
.sub{font-size:.64rem;color:#7a7870;margin-top:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:#7a7870;border-bottom:1px solid rgba(0,0,0,.08);padding-bottom:.35rem;margin-bottom:.7rem}
/* ── Grid ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(308px,1fr));gap:.9rem}
.card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:rgba(0,0,0,.22);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card.open{grid-column:1/-1;cursor:default}
/* ── Card header ── */
.ch{padding:.78rem 1rem .62rem;border-bottom:1px solid rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:flex-start;gap:.7rem}
.cname{font-family:Georgia,serif;font-size:.92rem;font-weight:normal;color:#1a1916;line-height:1.3}
.cmeta{font-size:.65rem;color:#7a7870;margin-top:.15rem}
.badge{font-size:.61rem;padding:.15rem .5rem;border-radius:100px;background:#e8f0fe;color:#1a4db5;border:1px solid #a8c4f8;white-space:nowrap;flex-shrink:0}
.badge.s1{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe}
/* ── Stats row ── */
.cstats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid rgba(0,0,0,.07)}
.sb{padding:.48rem .78rem;border-right:1px solid rgba(0,0,0,.07)}
.sb:last-child{border-right:none}
.slbl{font-size:.57rem;text-transform:uppercase;letter-spacing:.05em;color:#7a7870}
.sval{font-size:.88rem;font-weight:600;margin-top:.1rem;font-family:'Courier New',monospace}
.up{color:#2f9e44}.dn{color:#c92a2a}.nu{color:#868e96}
/* ── Bars ── */
.bars{padding:.58rem 1rem .68rem}
.yr{display:flex;align-items:center;gap:.42rem;margin-bottom:.3rem}
.ytag{width:32px;font-weight:600;color:#7a7870;font-family:'Courier New',monospace;font-size:.65rem;flex-shrink:0}
.track{flex:1;height:13px;background:#ece9e3;border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px;transition:width .5s ease}
.vval{width:68px;text-align:right;font-family:'Courier New',monospace;font-size:.65rem;color:#1a1916;flex-shrink:0}
.vdelta{width:54px;text-align:right;font-family:'Courier New',monospace;font-size:.61rem;flex-shrink:0}
/* ── Expanded panel ── */
.cwrap{padding:0 1rem 1.1rem;display:none}
.card.open .cwrap{display:block}
.tab-bar{display:flex;gap:0;border-bottom:1px solid rgba(0,0,0,.1);margin-bottom:.7rem;margin-top:.25rem}
.tab{padding:.35rem .85rem;font-size:.71rem;cursor:pointer;border-bottom:2.5px solid transparent;color:#7a7870;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s}
.tab:hover{color:#1a1916}
.tab.on{border-bottom-color:#2b18b0;color:#2b18b0;font-weight:600}
/* ── City table ── */
.ct-wrap{overflow-x:auto}
.ct-ano-title{font-size:.7rem;font-weight:600;color:#7a7870;text-transform:uppercase;letter-spacing:.05em;margin:.8rem 0 .3rem;padding-bottom:.25rem;border-bottom:1px solid rgba(0,0,0,.07)}
.ct-ano-title:first-child{margin-top:0}
.ct{width:100%;font-size:.74rem;border-collapse:collapse}
.ct th{text-align:left;font-size:.59rem;text-transform:uppercase;letter-spacing:.05em;color:#7a7870;padding:.28rem .45rem;border-bottom:1px solid rgba(0,0,0,.08)}
.ct th:nth-child(2),.ct th:nth-child(3){text-align:right}
.ct td{padding:.28rem .45rem;border-bottom:1px solid rgba(0,0,0,.04)}
.ct td:nth-child(2),.ct td:nth-child(3){text-align:right;font-family:'Courier New',monospace}
.ct tr:last-child td{border-bottom:none}
.ct tr:hover td{background:#f9f8f6}
.ct-bar-wrap{width:80px;display:inline-block;vertical-align:middle}
.ct-bar{height:6px;background:#6355ce;border-radius:2px}
/* ── Misc ── */
.no-r{grid-column:1/-1;text-align:center;padding:3rem;color:#7a7870;font-family:Georgia,serif;font-style:italic;font-size:1rem}
@media(max-width:640px){.tb{gap:.4rem}.tb input{width:120px}main{padding:.9rem 1rem 2rem}.cstats{grid-template-columns:1fr 1fr}}
</style>
</head>

</div>

<div class="ac-banner" id="acbanner">

</div>

<main>

  <div id="grid"></div>
</main>

function norm(s){return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim()}

function fP(v){if(v==null)return'';return(v>0?'+':'')+v.toFixed(1)+'%'}
function tc(v){return v>0?'up':v<0?'dn':'nu'}

  selCity.appendChild(o);

/* ── Top stats ── */
function renderTop(names){
  let maxC='',maxV=0,maxAccC='',maxAcc=0,maxEC='',maxE=0,bestG=0,bestGC='';
  names.forEach(n=>{
    const d=DATA[n];
    const mv=Math.max(...d.v);
    const ac=d.acc[d.acc.length-1];
    if(mv>maxV){maxV=mv;maxC=n}
    if(ac>maxAcc){maxAcc=ac;maxAccC=n}
    if(d.q>maxE){maxE=d.q;maxEC=n}
    d.p.forEach(x=>{if(x>bestG){bestG=x;bestGC=n}});
  });
  const c6=names.filter(n=>DATA[n].q>=6).length;
  const c1=names.filter(n=>DATA[n].q===1).length;
  document.getElementById('toprow').innerHTML=`
    <div class="top-box"><div class="lbl">Maior votação única</div><div class="val">${fmt(maxV)}</div><div class="sub">${maxC}</div></div>
    <div class="top-box"><div class="lbl">Maior acumulado</div><div class="val">${fmt(maxAcc)}</div><div class="sub">${maxAccC}</div></div>
    <div class="top-box"><div class="lbl">Mais eleições</div><div class="val">${maxE}× eleito</div><div class="sub">${maxEC}</div></div>
    <div class="top-box"><div class="lbl">Maior salto entre pleitos</div><div class="val up">+${bestG.toFixed(1)}%</div><div class="sub">${bestGC}</div></div>
    <div class="top-box"><div class="lbl">Em todos os 6 pleitos</div><div class="val">${c6} dep.</div><div class="sub">2002–2022</div></div>
    <div class="top-box"><div class="lbl">Eleitos apenas 1 vez</div><div class="val">${c1} dep.</div><div class="sub">sem reeleição</div></div>`;
}

/* ── Main render ── */
let activeCharts={};

function render(){
  const srch  = document.getElementById('srch').value.toLowerCase().trim();
  const fminV = document.getElementById('fmin').value;
  const fsort = document.getElementById('fsort').value;
  const fcity = document.getElementById('fcity').value;
  const fano  = parseInt(document.getElementById('fano').value)||0;

  let names=Object.keys(DATA).filter(n=>{
    const d=DATA[n];
    if(srch && !n.toLowerCase().includes(srch)) return false;
    if(fminV==='1x' && d.q!==1) return false;
    if(fminV!=='1x' && d.q<parseInt(fminV)) return false;
    if(fcity && !(d.nb||[]).includes(fcity)) return false;
    if(fano && !d.a.includes(fano)) return false;
    return true;
  });

  if(fsort==='name') names.sort();
  else if(fsort==='max') names.sort((a,b)=>Math.max(...DATA[b].v)-Math.max(...DATA[a].v));
  else if(fsort==='acc') names.sort((a,b)=>DATA[b].acc[DATA[b].acc.length-1]-DATA[a].acc[DATA[a].acc.length-1]);
  else if(fsort==='qtd') names.sort((a,b)=>DATA[b].q-DATA[a].q);
  else if(fsort==='ano') names.sort((a,b)=>DATA[b].l-DATA[a].l);

  document.getElementById('pill').innerHTML=`<strong>${names.length}</strong> candidatos`;

  /* section title & city banner */
  const parts=[];
  if(fminV==='1x') parts.push('apenas 1 eleição');
  else if(parseInt(fminV)>1) parts.push(`${fminV}+ eleições`);
  if(fano) parts.push(`eleição ${fano}`);

  const banner=document.getElementById('acbanner');
  if(fcity){
    const dispCity=CITIES.find(c=>norm(c)===fcity)||fcity;
    parts.push(`base em ${dispCity}`);
    const totalV=names.reduce((s,n)=>{
      const d=DATA[n];
      return s+d.a.reduce((ss,yr,i)=>(!fano||yr===fano)?ss+d.v[i]:ss,0);
    },0);
    const totalAcc=names.reduce((s,n)=>{
      const d=DATA[n]; return s+d.acc[d.acc.length-1];
    },0);
    document.getElementById('actext').innerHTML=
      `Cidade: <strong>${dispCity}</strong>${fano?' · '+fano:''} &nbsp;|&nbsp; `+
      `${names.length} deputados &nbsp;|&nbsp; `+
      `Votos no${fano?' pleito':'s pleitos'}: <strong>${fmt(totalV)}</strong> &nbsp;|&nbsp; `+
      `Acumulado total: <strong>${fmt(totalAcc)}</strong>`;
    banner.style.display='flex';
  } else {
    banner.style.display='none';
  }

  document.getElementById('stitle').textContent=
    parts.length ? 'Deputados: '+parts.join(' · ') : 'Todos os deputados eleitos';

  renderTop(names);

  /* destroy old charts */
  Object.values(activeCharts).forEach(ch=>{try{ch.destroy();}catch(e){}});
  activeCharts={};

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  if(!names.length){grid.innerHTML='<div class="no-r">Nenhum candidato encontrado com estes filtros.</div>';return;}

  names.forEach(name=>grid.appendChild(buildCard(name, fano)));
}

/* ── Build card ── */
function buildCard(name, fano){
  const d=DATA[name];
  const idxs=fano ? d.a.map((yr,i)=>yr===fano?i:-1).filter(i=>i>=0) : d.a.map((_,i)=>i);
  const visVotos=idxs.map(i=>d.v[i]);
  const mv=Math.max(...visVotos);
  const acc=d.acc[d.acc.length-1];
  const lp=d.p[d.p.length-1];
  const isSingle=d.q===1;
  const ovP=d.q>1?((d.v[d.v.length-1]-d.v[0])/d.v[0]*100):null;
  const sid='c'+name.replace(/[^a-zA-Z0-9]/g,'_');

  /* bars */
  let bars='';
  idxs.forEach(i=>{
    const ano=d.a[i]; const pct=(d.v[i]/mv)*100; const vp=d.p[i];
    const delta=i>0
      ?`<span class="vdelta ${tc(vp)}">${fP(vp)}</span>`
      :`<span class="vdelta" style="font-size:.6rem;color:#7a7870">1ª eleição</span>`;
    bars+=`<div class="yr">
      <span class="ytag">${ano}</span>
      <div class="track"><div class="fill" style="width:${pct.toFixed(1)}%;background:${BC[ano]||'#4263eb'}"></div></div>
      <span class="vval">${fmt(d.v[i])}</span>${delta}
    </div>`;
  });

  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="ch">
      <div>
        <div class="cname">${name}</div>
        <div class="cmeta">${d.f}${d.l!==d.f?' → '+d.l:''} &nbsp;·&nbsp; base: ${d.b[d.b.length-1]}</div>
      </div>
      <span class="badge${isSingle?' s1':''}">${d.q}× eleito</span>
    </div>
    <div class="cstats">
      <div class="sb"><div class="slbl">Pico de votos</div><div class="sval">${fmt(Math.max(...d.v))}</div></div>
      <div class="sb"><div class="slbl">Acumulado</div><div class="sval">${fmt(acc)}</div></div>
      <div class="sb"><div class="slbl">Últ. variação</div><div class="sval ${tc(lp)}">${isSingle?'—':fP(lp)}</div></div>
      <div class="sb"><div class="slbl">Var. total</div><div class="sval ${ovP!=null?tc(ovP):'nu'}">${ovP!=null?fP(ovP):'—'}</div></div>
    </div>
    <div class="bars">${bars}</div>
    ${!isSingle?`
    <div class="cwrap" id="${sid}">
      <div class="tab-bar">
        <button class="tab on" data-tab="chart" data-sid="${sid}">Evolução</button>
        <button class="tab" data-tab="acum" data-sid="${sid}">Acumulado</button>
        <button class="tab" data-tab="cities" data-sid="${sid}">Por cidade</button>
      </div>
      <div id="${sid}_chart"><div style="position:relative;height:200px"><canvas id="cv${sid}" role="img" aria-label="Evolução de votos de ${name}"></canvas></div></div>
      <div id="${sid}_acum" style="display:none"><div style="position:relative;height:200px"><canvas id="ca${sid}" role="img" aria-label="Acumulado de ${name}"></canvas></div></div>
      <div id="${sid}_cities" style="display:none"><div class="ct-wrap" id="ct${sid}"></div></div>
    </div>`:``}`;

  /* click to expand */
  if(!isSingle){
    card.addEventListener('click', e=>{
      if(e.target.closest('.tab')||e.target.closest('.cwrap')) return;
      toggleCard(card, name, sid);
    });
    /* tab clicks */
    card.querySelectorAll('.tab').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        const tab=btn.dataset.tab;
        const s=btn.dataset.sid;
        card.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
        btn.classList.add('on');
        ['chart','acum','cities'].forEach(t=>{
          const el=document.getElementById(`${s}_${t}`);
          if(el) el.style.display=t===tab?'block':'none';
        });
        if(tab==='acum' && !document.getElementById('ca'+s)._drawn) drawAcum(name,s);
        if(tab==='cities' && !document.getElementById('ct'+s)._drawn) drawCities(name,s);
      });
    });
  }
  return card;
}

/* ── Toggle expand ── */
function toggleCard(card, name, sid){
  const wasOpen=card.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c=>c.classList.remove('open'));
  Object.values(activeCharts).forEach(ch=>{try{ch.destroy();}catch(e){}});
  activeCharts={};
  if(!wasOpen){
    card.classList.add('open');
    drawEvol(name, sid);
  }
}

/* ── Chart: Evolução ── */
function drawEvol(name, sid){
  const d=DATA[name];
  const canvas=document.getElementById('cv'+sid);
  if(!canvas) return;
  if(activeCharts[sid]) try{activeCharts[sid].destroy();}catch(e){}
  activeCharts[sid]=new Chart(canvas,{
    type:'line',
    data:{labels:d.a.map(String),datasets:[{
      label:'Votos',data:d.v,
      borderColor:'#2b18b0',backgroundColor:'rgba(43,24,176,0.07)',
      borderWidth:2.5,tension:0.3,fill:true,
      pointBackgroundColor:d.v.map((_,i)=>i===0?'#868e96':d.p[i]>0?'#2f9e44':'#c92a2a'),
      pointRadius:6,pointHoverRadius:8
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:ctx=>{
          const i=ctx.dataIndex;
          let s='Votos: '+fmt(ctx.parsed.y);
          if(i>0) s+='  ('+fP(d.p[i])+')';
          return s;
        },
        afterLabel:ctx=>{
          const i=ctx.dataIndex;
          return 'Base: '+d.b[i]+' · '+d.c[i].toFixed(1)+'% conc. · acum: '+fmt(d.acc[i]);
        }
      }}},
      scales:{
        x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},autoSkip:false}},
        y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},callback:v=>new Intl.NumberFormat('pt-BR',{notation:'compact'}).format(v)}}
      }
    }
  });
}

/* ── Chart: Acumulado ── */
function drawAcum(name, sid){
  const ca=document.getElementById('ca'+sid);
  if(!ca) return;
  ca._drawn=true;
  const d=DATA[name];
  new Chart(ca,{
    type:'bar',
    data:{labels:d.a.map(String),datasets:[
      {label:'Votos no pleito',data:d.v,backgroundColor:d.a.map(a=>BC[a]||'#4263eb'),borderRadius:3,order:2},
      {label:'Acumulado',data:d.acc,type:'line',borderColor:'#e67700',backgroundColor:'rgba(230,119,0,0.08)',
       borderWidth:2.5,pointRadius:5,tension:0.3,fill:true,yAxisID:'y2',order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:10},boxWidth:10,padding:12}}},
      scales:{
        x:{ticks:{font:{size:11},autoSkip:false}},
        y:{ticks:{font:{size:10},callback:v=>new Intl.NumberFormat('pt-BR',{notation:'compact'}).format(v)},grid:{color:'rgba(0,0,0,0.04)'}},
        y2:{position:'right',ticks:{font:{size:10},callback:v=>new Intl.NumberFormat('pt-BR',{notation:'compact'}).format(v)},grid:{drawOnChartArea:false}}
      }
    }
  });
}

/* ── Table: Por cidade ── */
function drawCities(name, sid){
  const wrap=document.getElementById('ct'+sid);
  if(!wrap) return;
  wrap._drawn=true;
  const d=DATA[name];
  let html='';
  d.a.forEach((ano,yi)=>{
    const pairs=d.cv[yi]||[];
    if(!pairs.length) return;
    const total=pairs.reduce((s,p)=>s+p[1],0);
    const maxV=pairs[0][1];
    html+=`<div class="ct-ano-title">${ano} — ${pairs.length} municípios · ${fmt(total)} votos</div>`;
    html+=`<table class="ct"><thead><tr><th>#</th><th>Município</th><th>Votos</th><th>% do total</th><th style="width:90px">Concentração</th></tr></thead><tbody>`;
    pairs.forEach((p,ri)=>{
      const pct=(p[1]/total*100);
      const bw=Math.round(p[1]/maxV*80);
      html+=`<tr>
        <td style="color:#7a7870;font-family:'Courier New',monospace;font-size:.62rem">${ri+1}</td>
        <td>${p[0]}</td>
        <td>${fmt(p[1])}</td>
        <td>${pct.toFixed(1)}%</td>
        <td><div class="ct-bar-wrap"><div class="ct-bar" style="width:${bw}px;background:${BC[ano]||'#4263eb'}"></div></div></td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  });
  wrap.innerHTML=html;
}

/* ── Event listeners ── */

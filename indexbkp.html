.badge.s1{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe}
.cstats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid rgba(0,0,0,0.07)}

.fill{height:100%;border-radius:2px}
.vval{width:72px;text-align:right;font-family:'Courier New',monospace;font-size:0.7rem;color:#1a1916;flex-shrink:0}

function fmt(n){return n==null?'–':new Intl.NumberFormat('pt-BR').format(Math.round(n))}
function fP(v){if(v==null)return'';return(v>0?'+':'')+v.toFixed(1)+'%'}
function tc(v){return v>0?'up':v<0?'dn':'nu'}
let openChart=null;
function renderTop(){
  const keys=Object.keys(DATA);
  let maxC='',maxV=0,maxEC='',maxE=0,bestG=0,bestGC='';
  keys.forEach(n=>{const d=DATA[n];const mv=Math.max(...d.v);if(mv>maxV){maxV=mv;maxC=n}if(d.q>maxE){maxE=d.q;maxEC=n}d.p.forEach(x=>{if(x>bestG){bestG=x;bestGC=n}});});
  const c6=keys.filter(n=>DATA[n].q>=6).length,c1=keys.filter(n=>DATA[n].q===1).length;
  document.getElementById('toprow').innerHTML=`<div class="top-box"><div class="lbl">Maior votação</div><div class="val">${fmt(maxV)}</div><div class="sub">${maxC}</div></div><div class="top-box"><div class="lbl">Mais eleições</div><div class="val">${maxE}× eleito</div><div class="sub">${maxEC}</div></div><div class="top-box"><div class="lbl">Maior salto entre pleitos</div><div class="val up">+${bestG.toFixed(1)}%</div><div class="sub">${bestGC}</div></div><div class="top-box"><div class="lbl">Em todos os 6 pleitos</div><div class="val">${c6} dep.</div><div class="sub">2002–2022</div></div><div class="top-box"><div class="lbl">Eleitos apenas 1 vez</div><div class="val">${c1} dep.</div><div class="sub">sem reeleição</div></div>`;
}
function render(){
  const srch=document.getElementById('srch').value.toLowerCase().trim();
  const fmin=parseInt(document.getElementById('fmin').value);
  const fsort=document.getElementById('fsort').value;
  let names=Object.keys(DATA).filter(n=>DATA[n].q>=fmin&&(!srch||n.toLowerCase().includes(srch)));
  if(fsort==='name')names.sort();
  else if(fsort==='max')names.sort((a,b)=>Math.max(...DATA[b].v)-Math.max(...DATA[a].v));
  else if(fsort==='qtd')names.sort((a,b)=>DATA[b].q-DATA[a].q);
  else if(fsort==='ano')names.sort((a,b)=>DATA[b].l-DATA[a].l);
  document.getElementById('pill').innerHTML=`<strong>${names.length}</strong> candidatos`;
  document.getElementById('stitle').textContent=fmin===1?'Todos os deputados eleitos':`Deputados com ${fmin}+ eleições`;
  const grid=document.getElementById('grid');grid.innerHTML='';
  if(!names.length){grid.innerHTML='<div class="no-r">Nenhum candidato encontrado.</div>';return;}
  names.forEach(name=>{
    const d=DATA[name];const mv=Math.max(...d.v);const lv=d.v[d.v.length-1],fv=d.v[0];
    const lp=d.p[d.p.length-1];const ovP=d.q>1?((lv-fv)/fv*100):null;const isSingle=d.q===1;
    const sid='c'+name.replace(/[^a-zA-Z0-9]/g,'_');
    let bars='';
    d.a.forEach((ano,i)=>{
      const pct=(d.v[i]/mv)*100;const vp=d.p[i];
      const delta=i>0?`<span class="vdelta ${tc(vp)}">${fP(vp)}</span>`:`<span class="vdelta" style="font-size:0.62rem;color:#7a7870">1ª</span>`;
      bars+=`<div class="yr"><span class="ytag">${ano}</span><div class="track"><div class="fill" style="width:${pct.toFixed(1)}%;background:${BC[ano]||'#4263eb'}"></div></div><span class="vval">${fmt(d.v[i])}</span>${delta}</div>`;
    });
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="ch"><div><div class="cname">${name}</div><div class="cmeta">${d.f}${d.l!==d.f?' → '+d.l:''} · ${d.b[d.b.length-1]}</div></div><span class="badge${isSingle?' s1':''}">${d.q}× eleito</span></div><div class="cstats"><div class="sb"><div class="slbl">Pico de votos</div><div class="sval">${fmt(mv)}</div></div><div class="sb"><div class="slbl">Últ. variação</div><div class="sval ${tc(lp)}">${isSingle?'—':fP(lp)}</div></div><div class="sb"><div class="slbl">Variação total</div><div class="sval ${ovP!=null?tc(ovP):'nu'}">${ovP!=null?fP(ovP):'—'}</div></div></div><div class="bars">${bars}</div>${!isSingle?`<div class="cwrap" id="${sid}"><div style="position:relative;height:200px;margin-top:0.25rem"><canvas id="cv${sid}" role="img" aria-label="Votos de ${name}"></canvas></div></div>`:''}`;
    if(!isSingle)card.addEventListener('click',()=>toggle(card,name,sid));
    grid.appendChild(card);
  });
}
function toggle(card,name,sid){
  const wasOpen=card.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c=>c.classList.remove('open'));
  if(openChart){try{openChart.destroy();}catch(e){}openChart=null;}
  if(!wasOpen){
    card.classList.add('open');const d=DATA[name];
    const canvas=document.getElementById('cv'+sid);if(!canvas)return;
    openChart=new Chart(canvas,{type:'line',data:{labels:d.a.map(String),datasets:[{label:'Votos',data:d.v,borderColor:'#2b18b0',backgroundColor:'rgba(43,24,176,0.07)',borderWidth:2,pointBackgroundColor:d.v.map((_,i)=>i===0?'#868e96':d.p[i]>0?'#2f9e44':'#c92a2a'),pointRadius:6,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const i=ctx.dataIndex;let s='Votos: '+new Intl.NumberFormat('pt-BR').format(ctx.parsed.y);if(i>0)s+='  ('+fP(d.p[i])+')';return s;},afterLabel:ctx=>{const i=ctx.dataIndex;return'Base: '+d.b[i]+' · '+d.c[i].toFixed(1)+'% conc.';}}}}  ,scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},autoSkip:false}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},callback:v=>new Intl.NumberFormat('pt-BR',{notation:'compact'}).format(v)}}}}}); 
  }
}
['srch','fmin','fsort'].forEach(id=>{document.getElementById(id).addEventListener('input',render);document.getElementById(id).addEventListener('change',render);});
renderTop();render();
</script>
